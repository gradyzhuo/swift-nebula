# This workflow will build and test swift-nebula
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  # Full build + test on Ubuntu with multiple Swift versions
  build:
    name: Swift ${{ matrix.swift }} on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        swift: ["6.0", "6.1", "6.2"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ matrix.swift }}
      - name: Build
        run: swift build --build-tests
      - name: Test
        run: swift test -v --disable-xctest --enable-swift-testing

  # Build + test on macOS (primary development platform)
  build-macos:
    name: Swift ${{ matrix.swift }} on macOS
    strategy:
      matrix:
        swift: ["6.2"]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ matrix.swift }}
      - name: Build
        run: swift build --build-tests
      - name: Test
        run: swift test -v --disable-xctest --enable-swift-testing

  # Build + test the standalone demo package
  build-demo:
    name: Demo package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: "6.2"
      - name: Build demo
        run: swift build --package-path samples/demo

  # Offline build on additional Linux distributions.
  # Uses `docker run` instead of the `container:` directive so that
  # actions/checkout@v4 (Node.js 20, requires GLIBC_2.27) runs on the Ubuntu
  # host, while the actual build and tests run inside the target container
  # where the Swift toolchain is pre-installed.
  build-linux-distros:
    name: Build on ${{ matrix.image }}
    strategy:
      matrix:
        image:
          - "swift:6.2-amazonlinux2"  # Amazon Linux 2 — primary AWS/Lambda deployment target
          - "swift:6.2-bookworm"      # Debian 12 — stable, covers non-Ubuntu Debian family
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ matrix.image }} \
            bash -c "swift build --build-tests && swift test -v --disable-xctest --enable-swift-testing"
